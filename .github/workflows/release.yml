name: Release

# Push a semver tag to cut a release:
#   npm version patch   # bumps package.json + creates the vX.Y.Z tag
#   git push --follow-tags
# This builds a standalone `regraft` binary for each platform, attests build
# provenance, and publishes everything as assets on a GitHub Release. The
# installer downloads from /releases/latest. Verify a downloaded binary with:
#   gh attestation verify <file> --repo treadiehq/regraft

on:
  push:
    tags:
      - "v*"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source release
        run: |
          node -e 'const p=require("./package.json"); const tag=process.env.GITHUB_REF_NAME.replace(/^v/,""); if (p.version !== tag) throw new Error(`package ${p.version} does not match tag ${tag}`)'
          pnpm lint
          pnpm test:run
          pnpm build
          node dist/cli.js validate examples/session-graft/regraft.yaml
          bash examples/session-graft/run.sh
          pnpm pack --dry-run

  build:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: regraft-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: regraft-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: regraft-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: regraft-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: regraft-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        # macOS: Bun can embed a truncated LC_CODE_SIGNATURE that the kernel rejects,
        # so skip Bun's signing and ad-hoc sign in the next step instead.
        # Use bash everywhere (Git Bash ships on the Windows runner) so one script works.
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if echo "${{ matrix.target }}" | grep -q darwin; then
            export BUN_NO_CODESIGN_MACHO_BINARY=1
          fi
          bun build src/cli.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.artifact }} \
            --define __REGRAFT_VERSION__="\"$VERSION\""

      - name: Ad-hoc sign macOS binary
        if: contains(matrix.target, 'darwin')
        run: |
          codesign --force --sign - "${{ matrix.artifact }}"
          codesign --verify --strict "${{ matrix.artifact }}"

      - name: Smoke test binary
        shell: bash
        run: |
          chmod +x "${{ matrix.artifact }}"
          # Only run a binary that matches the runner's architecture.
          M="$(uname -m)"
          case "${{ matrix.target }}" in
            *x64)   WANT="x86_64|amd64" ;;
            *arm64) WANT="arm64|aarch64" ;;
          esac
          if echo "$M" | grep -Eq "$WANT"; then
            OUT="$(./${{ matrix.artifact }} --version)"
            echo "regraft --version → $OUT"
            test "$OUT" = "${GITHUB_REF_NAME#v}" || { echo "version mismatch"; exit 1; }
          else
            file "${{ matrix.artifact }}"
            echo "Cross-compiled for $M host; format checked only."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          (cd release && for f in *; do sha256sum "$f" >> SHA256SUMS; done)
          ls -la release/

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: release/regraft-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
